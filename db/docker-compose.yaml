services:
  postgres:
    image: postgres:18.1-trixie
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - spring-batch-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  pg-admin:
    image: dpage/pgadmin4:9.15.0
    container_name: pgadmin
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGPASSFILE: /tmp/pgpassfile
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /pgpassfile-src /tmp/pgpassfile
        chmod 600 /tmp/pgpassfile
        chown pgadmin:pgadmin /tmp/pgpassfile 2>/dev/null || true
        exec /entrypoint.sh
    volumes:
      - spring-batch-pgadmin-data:/var/lib/pgadmin
      - ./pgpassfile:/pgpassfile-src:ro
      - ./pgadminservers.json:/pgadmin4/servers.json:ro
volumes:
  spring-batch-postgres-data:
    name: spring-batch-postgres-data
  spring-batch-pgadmin-data:
    name: spring-batch-pgadmin-data

